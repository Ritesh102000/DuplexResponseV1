name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test
        run: mvn verify
      - name: Validate router labels
        run: python3 scripts/validate_router_labels.py docs/eval/router-labels.jsonl
      - name: Evaluate heuristic router
        run: python3 scripts/router_eval.py docs/eval/router-labels.jsonl
      - name: Analyze sample event log
        run: python3 metrics/analyze.py metrics/fixtures/events.jsonl --out metrics/out
      - name: Run stub flow judge
        run: python3 metrics/judge_flow.py metrics/fixtures/judge-samples.jsonl --out metrics/out --mode stub

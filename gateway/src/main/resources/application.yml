spring:
  application:
    name: voice-two-brains-gateway
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

voice:
  moshi-mode: ${MOSHI_MODE:stub}
  moshi-ws-url: ${MOSHI_WS_URL:ws://localhost:8998/api/chat}
  stt-mode: ${STT_MODE:stub}
  tts-mode: ${TTS_MODE:stub}
  tts-url: ${TTS_URL:http://localhost:8082}
  llm-mode: ${LLM_MODE:stub}
  llm-base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
  llm-api-key: ${LLM_API_KEY:}
  llm-model-answer: ${LLM_MODEL_ANSWER:gpt-5.4-mini}
  llm-model-router: ${LLM_MODEL_ROUTER:gpt-5.4-mini}
  ask-timeout-ms: ${ASK_TIMEOUT_MS:20000}
  stale-turn-limit: ${STALE_TURN_LIMIT:2}
  event-log-path: ${EVENT_LOG_PATH:./data/events.jsonl}
  suppression-token-threshold: ${SUPPRESSION_TOKEN_THRESHOLD:8}
  suppression-fade-ms: ${SUPPRESSION_FADE_MS:250}
  barge-in-min-ms: ${BARGE_IN_MIN_MS:400}
  barge-in-energy-threshold: ${BARGE_IN_ENERGY_THRESHOLD:0.015}
  stub-tts-frame-count: ${STUB_TTS_FRAME_COUNT:6}

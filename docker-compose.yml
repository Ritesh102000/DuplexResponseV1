services:
  gateway:
    build:
      context: ./gateway
    environment:
      VOICE_RUNTIME: ${VOICE_RUNTIME:-moshi}
      MOSHI_MODE: stub
      STT_MODE: stub
      TTS_MODE: stub
      LLM_MODE: stub
      FAST_LLM_MODE: ${FAST_LLM_MODE:-stub}
      FAST_LLM_BASE_URL: ${FAST_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      FAST_LLM_API_KEY: ${FAST_LLM_API_KEY:-}
      FAST_LLM_MODEL: ${FAST_LLM_MODEL:-qwen3:4b}
      FAST_REPLY_MAX_TOKENS: ${FAST_REPLY_MAX_TOKENS:-60}
      FAST_REPLY_TEMPERATURE: ${FAST_REPLY_TEMPERATURE:-0.7}
      FAST_PENDING_MAX_WORDS: ${FAST_PENDING_MAX_WORDS:-18}
      FAST_STALE_UTTERANCE_MS: ${FAST_STALE_UTTERANCE_MS:-4000}
      EVENT_LOG_PATH: /data/events.jsonl
      VOICE_WS_TOKEN: ${VOICE_WS_TOKEN:-}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      SIDECAR_STARTUP_RETRIES: ${SIDECAR_STARTUP_RETRIES:-20}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - ./data:/data
  stt:
    build:
      context: ./stt-service
    environment:
      STT_WHISPER_MODEL: ${STT_WHISPER_MODEL:-small}
      STT_DEVICE: ${STT_DEVICE:-cpu}
      STT_COMPUTE_TYPE: ${STT_COMPUTE_TYPE:-int8}
      STT_LANGUAGE: ${STT_LANGUAGE:-en}
    ports:
      - "8081:8081"
  tts:
    build:
      context: ./tts-service
    environment:
      TTS_ESPEAK_VOICE: ${TTS_ESPEAK_VOICE:-en-us}
      TTS_ESPEAK_SPEED: ${TTS_ESPEAK_SPEED:-165}
    ports:
      - "8082:8082"
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 12
  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 12

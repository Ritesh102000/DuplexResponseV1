services:
  gateway:
    build:
      context: ./gateway
    environment:
      MOSHI_MODE: stub
      STT_MODE: stub
      TTS_MODE: stub
      LLM_MODE: stub
      EVENT_LOG_PATH: /data/events.jsonl
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - ./data:/data
  stt:
    build:
      context: ./stt-service
    ports:
      - "8081:8081"
  tts:
    build:
      context: ./tts-service
    ports:
      - "8082:8082"
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gateway
  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
